<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="160" fill="url(#bg)"/>
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="120" x2="800" y2="120"/>
  </g>
  <!-- shield -->
  <path d="M90,20 L160,20 L175,45 L125,130 L90,130 L55,45 Z" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.6)" stroke-width="2" stroke-linejoin="round"/>
  <polyline points="82,73 110,100 168,55" fill="none" stroke="rgba(167,139,250,0.8)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- compound growth bars -->
  <g fill="rgba(167,139,250,0.5)">
    <rect x="260" y="130" width="22" height="22" rx="2"/>
    <rect x="296" y="110" width="22" height="42" rx="2"/>
    <rect x="332" y="88" width="22" height="64" rx="2"/>
    <rect x="368" y="64" width="22" height="88" rx="2"/>
    <rect x="404" y="40" width="22" height="112" rx="2"/>
    <rect x="440" y="22" width="22" height="130" rx="2"/>
  </g>
  <!-- timeline labels -->
  <text x="268" y="156" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">20s</text>
  <text x="304" y="156" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">30s</text>
  <text x="340" y="156" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">40s</text>
  <text x="376" y="156" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">50s</text>
  <text x="412" y="156" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">60s</text>
  <!-- retirement icon -->
  <g transform="translate(580, 30)" fill="none" stroke="rgba(167,139,250,0.7)" stroke-width="2.5" stroke-linecap="round">
    <circle cx="60" cy="40" r="28"/>
    <polyline points="60,20 60,42 75,55"/>
  </g>
  <!-- SUPER label -->
  <rect x="536" y="100" width="90" height="30" rx="6" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
  <text x="555" y="121" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="rgba(167,139,250,0.9)">SUPER</text>
</svg>

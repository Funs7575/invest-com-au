<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
  </defs>
  <rect width="800" height="160" fill="url(#bg)"/>
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="120" x2="800" y2="120"/>
  </g>
  <!-- rising area chart -->
  <path d="M0,140 L80,130 L160,118 L240,100 L320,85 L400,68 L480,50 L560,38 L640,28 L720,18 L800,12 L800,160 L0,160Z" fill="rgba(99,102,241,0.15)"/>
  <polyline points="0,140 80,130 160,118 240,100 320,85 400,68 480,50 560,38 640,28 720,18 800,12" stroke="#818cf8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- bar chart overlay left -->
  <g fill="rgba(99,102,241,0.4)">
    <rect x="60" y="90" width="24" height="50"/>
    <rect x="100" y="75" width="24" height="65"/>
    <rect x="140" y="55" width="24" height="85"/>
    <rect x="180" y="42" width="24" height="98"/>
  </g>
  <!-- target/bullseye right -->
  <circle cx="660" cy="80" r="50" fill="none" stroke="rgba(129,140,248,0.2)" stroke-width="2"/>
  <circle cx="660" cy="80" r="35" fill="none" stroke="rgba(129,140,248,0.3)" stroke-width="2"/>
  <circle cx="660" cy="80" r="18" fill="none" stroke="rgba(129,140,248,0.5)" stroke-width="2"/>
  <circle cx="660" cy="80" r="7" fill="rgba(129,140,248,0.8)"/>
  <!-- arrow hitting target -->
  <line x1="590" y1="80" x2="645" y2="80" stroke="rgba(167,139,250,0.7)" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="645,80 634,74 634,86" fill="rgba(167,139,250,0.7)"/>
</svg>

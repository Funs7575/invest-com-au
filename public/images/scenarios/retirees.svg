<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>
  <!-- sun glow -->
  <circle cx="400" cy="200" r="160" fill="url(#sun)"/>
  <!-- horizon line -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- sun circle -->
  <circle cx="400" cy="148" r="38" fill="rgba(255,220,100,0.85)"/>
  <!-- sun rays -->
  <g stroke="rgba(255,220,100,0.5)" stroke-width="2">
    <line x1="400" y1="98" x2="400" y2="88"/>
    <line x1="432" y1="108" x2="439" y2="100"/>
    <line x1="448" y1="138" x2="458" y2="136"/>
    <line x1="368" y1="108" x2="361" y2="100"/>
    <line x1="352" y1="138" x2="342" y2="136"/>
  </g>
  <!-- calm waves below horizon -->
  <path d="M0,165 Q100,155 200,165 Q300,175 400,165 Q500,155 600,165 Q700,175 800,165 L800,200 L0,200 Z" fill="rgba(255,255,255,0.1)"/>
  <!-- income bars on left -->
  <g fill="rgba(255,255,255,0.6)">
    <rect x="60" y="120" width="18" height="30"/>
    <rect x="88" y="105" width="18" height="45"/>
    <rect x="116" y="90" width="18" height="60"/>
    <rect x="144" y="80" width="18" height="70"/>
    <rect x="172" y="68" width="18" height="82"/>
  </g>
  <!-- leaf/growth icon right -->
  <g transform="translate(580, 50)" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5">
    <path d="M40,100 Q40,20 100,10 Q100,70 40,100Z" stroke-linejoin="round"/>
    <path d="M40,100 Q40,20 -20,10 Q-20,70 40,100Z" stroke-linejoin="round"/>
    <line x1="40" y1="100" x2="40" y2="120"/>
  </g>
</svg>

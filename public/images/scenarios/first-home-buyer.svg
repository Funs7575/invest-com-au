<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>
  <!-- subtle circle glow top-right -->
  <circle cx="680" cy="40" r="120" fill="url(#glow)"/>
  <!-- grid lines -->
  <line x1="0" y1="50" x2="800" y2="50" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="150" x2="800" y2="150" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- house outline -->
  <g transform="translate(100, 30)" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linejoin="round">
    <polygon points="70,0 140,60 0,60" />
    <rect x="20" y="60" width="100" height="80" />
    <rect x="50" y="95" width="30" height="45" />
    <rect x="25" y="70" width="25" height="25" />
    <rect x="90" y="70" width="25" height="25" />
  </g>
  <!-- chart line rising -->
  <polyline points="300,160 360,140 420,145 480,110 540,90 600,70 660,50" stroke="rgba(255,255,255,0.85)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- chart dots -->
  <circle cx="540" cy="90" r="5" fill="white" opacity="0.9"/>
  <circle cx="660" cy="50" r="6" fill="white"/>
  <!-- dollar sign -->
  <text x="680" y="65" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.3)">$</text>
</svg>

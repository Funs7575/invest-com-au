<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f9a8d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>
  <ellipse cx="280" cy="120" rx="240" ry="130" fill="url(#glow)"/>
  <!-- piggy bank body -->
  <ellipse cx="160" cy="115" rx="60" ry="52" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
  <!-- ear -->
  <ellipse cx="130" cy="75" rx="14" ry="12" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
  <!-- snout -->
  <ellipse cx="212" cy="122" rx="18" ry="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <circle cx="207" cy="120" r="3" fill="rgba(255,255,255,0.6)"/>
  <circle cx="217" cy="120" r="3" fill="rgba(255,255,255,0.6)"/>
  <!-- eye -->
  <circle cx="185" cy="100" r="5" fill="rgba(255,255,255,0.8)"/>
  <!-- legs -->
  <rect x="128" y="160" width="14" height="20" rx="4" fill="rgba(255,255,255,0.4)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <rect x="152" y="160" width="14" height="20" rx="4" fill="rgba(255,255,255,0.4)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <rect x="176" y="160" width="14" height="20" rx="4" fill="rgba(255,255,255,0.4)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- coin slot -->
  <rect x="145" y="68" width="22" height="5" rx="2.5" fill="rgba(255,255,255,0.7)"/>
  <!-- floating coins -->
  <circle cx="145" cy="44" r="14" fill="rgba(255,220,0,0.7)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="141" y="50" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="rgba(255,255,255,0.9)">$</text>
  <circle cx="100" cy="30" r="10" fill="rgba(255,220,0,0.5)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="185" cy="35" r="10" fill="rgba(255,220,0,0.5)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- compound growth chart right -->
  <polyline points="330,170 390,155 450,135 510,108 570,80 630,52 700,30" stroke="rgba(255,255,255,0.85)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M330,170 L700,170 L700,30 L630,52 L570,80 L510,108 L450,135 L390,155 L330,170Z" fill="rgba(255,255,255,0.06)"/>
  <!-- time labels -->
  <text x="330" y="185" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Now</text>
  <text x="680" y="185" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">18yrs</text>
</svg>

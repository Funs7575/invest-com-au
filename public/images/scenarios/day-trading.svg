<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>
  <!-- grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="133" y1="0" x2="133" y2="200"/><line x1="266" y1="0" x2="266" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/><line x1="533" y1="0" x2="533" y2="200"/>
    <line x1="666" y1="0" x2="666" y2="200"/>
  </g>
  <!-- candlesticks -->
  <g>
    <!-- candle 1 green -->
    <line x1="120" y1="90" x2="120" y2="165" stroke="#34d399" stroke-width="1.5"/>
    <rect x="112" y="105" width="16" height="40" fill="#34d399" rx="1"/>
    <!-- candle 2 red -->
    <line x1="160" y1="75" x2="160" y2="150" stroke="#f87171" stroke-width="1.5"/>
    <rect x="152" y="90" width="16" height="35" fill="#f87171" rx="1"/>
    <!-- candle 3 green -->
    <line x1="200" y1="65" x2="200" y2="145" stroke="#34d399" stroke-width="1.5"/>
    <rect x="192" y="80" width="16" height="45" fill="#34d399" rx="1"/>
    <!-- candle 4 green -->
    <line x1="240" y1="55" x2="240" y2="130" stroke="#34d399" stroke-width="1.5"/>
    <rect x="232" y="70" width="16" height="40" fill="#34d399" rx="1"/>
    <!-- candle 5 red -->
    <line x1="280" y1="70" x2="280" y2="140" stroke="#f87171" stroke-width="1.5"/>
    <rect x="272" y="85" width="16" height="35" fill="#f87171" rx="1"/>
    <!-- candle 6 green -->
    <line x1="320" y1="45" x2="320" y2="125" stroke="#34d399" stroke-width="1.5"/>
    <rect x="312" y="60" width="16" height="45" fill="#34d399" rx="1"/>
    <!-- candle 7 green big -->
    <line x1="360" y1="30" x2="360" y2="110" stroke="#34d399" stroke-width="1.5"/>
    <rect x="352" y="45" width="16" height="50" fill="#34d399" rx="1"/>
    <!-- candle 8 red -->
    <line x1="400" y1="50" x2="400" y2="120" stroke="#f87171" stroke-width="1.5"/>
    <rect x="392" y="60" width="16" height="40" fill="#f87171" rx="1"/>
  </g>
  <!-- moving average line -->
  <polyline points="100,145 160,135 220,120 280,110 340,92 400,80 460,70 520,62 580,55 640,48 700,40" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.8" stroke-dasharray="6,3"/>
  <!-- volume bars at bottom -->
  <g fill="rgba(255,255,255,0.15)">
    <rect x="112" y="175" width="16" height="15"/>
    <rect x="152" y="172" width="16" height="18"/>
    <rect x="192" y="168" width="16" height="22"/>
    <rect x="232" y="170" width="16" height="20"/>
    <rect x="272" y="174" width="16" height="16"/>
    <rect x="312" y="165" width="16" height="25"/>
    <rect x="352" y="162" width="16" height="28"/>
    <rect x="392" y="171" width="16" height="19"/>
  </g>
</svg>

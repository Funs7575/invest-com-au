<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>
  <ellipse cx="200" cy="140" rx="220" ry="100" fill="url(#glow)"/>
  <!-- tree trunk -->
  <rect x="195" y="120" width="10" height="55" fill="rgba(255,255,255,0.5)" rx="2"/>
  <!-- tree canopy circles -->
  <circle cx="200" cy="100" r="38" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
  <circle cx="170" cy="118" r="26" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <circle cx="230" cy="118" r="26" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <!-- rising chart line -->
  <polyline points="330,165 390,145 450,135 510,105 570,80 630,58 690,40" stroke="rgba(255,255,255,0.85)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="690" cy="40" r="5" fill="white"/>
  <!-- leaf shapes top-right -->
  <g transform="translate(680, 10)" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5">
    <ellipse cx="30" cy="20" rx="18" ry="10" transform="rotate(-30 30 20)"/>
    <ellipse cx="55" cy="28" rx="18" ry="10" transform="rotate(10 55 28)"/>
  </g>
  <!-- E S G text subtle -->
  <text x="350" y="185" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.25)" letter-spacing="8">ENVIRONMENTAL · SOCIAL · GOVERNANCE</text>
</svg>

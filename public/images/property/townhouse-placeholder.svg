    <line x1="758" y1="470" x2="852" y2="470"/>
    <line x1="758" y1="505" x2="852" y2="505"/>
    <line x1="758" y1="540" x2="852" y2="540"/>
    <line x1="758" y1="575" x2="852" y2="575"/>

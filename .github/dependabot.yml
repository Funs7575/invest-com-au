# Dependabot config — weekly scheduled PRs for dependency upgrades.
#
# Scope:
#   - Production npm deps (grouped by minor/patch so we don't
#     drown in PR noise)
#   - Security-only updates fire immediately regardless of day
#   - GitHub Actions pinned versions
#
# Assignment: all PRs are labelled and land on @finn so one person
# owns the weekly green-ness of the dependency tree.

version: 2
updates:
  # ── npm ──
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Australia/Sydney
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
    groups:
      prod-patch:
        dependency-type: production
        update-types:
          - patch
      prod-minor:
        dependency-type: production
        update-types:
          - minor
      dev-patch-minor:
        dependency-type: development
        update-types:
          - patch
          - minor
      # Bundle vitest + the coverage provider so majors land in one
      # PR. Dependabot otherwise opens them separately, which causes
      # "Running mixed versions is not supported" crashes in CI until
      # the second PR lands.
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
        update-types:
          - major
          - minor
          - patch
      # Bundle React type packages together — @types/react and
      # @types/react-dom track the same React major and dependabot
      # otherwise splits minor/major bumps across separate PRs, which
      # triggers "types of children prop differ" TS errors until the
      # second PR lands. The dev-patch-minor group above already
      # catches patches; this dedicated group guarantees majors land
      # atomically too.
      react-types:
        patterns:
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - major
          - minor
    # Security advisories bypass the weekly schedule and open
    # immediately. There is no way to "group" these — one PR per
    # advisory is the safe default.
    ignore:
      # Next.js major versions need a manual migration pass
      - dependency-name: next
        update-types: ["version-update:semver-major"]
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ──
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions

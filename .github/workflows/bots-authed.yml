# 🔑 Bot fleet — authenticated personas
#
# Runs the logged-in bot suite: seed test users → capture Playwright auth
# storage states → route sweep (AUTHED_PERSONAS) + lifecycle flow
# (USER_LIFECYCLE_FLOW). All money/affiliate/external paths stay auto-mocked
# by bots/safety/money-paths.ts — zero financial side effects.
#
# Requirements (repo secrets):
#   SUPABASE_STAGING_URL             — staging Supabase project URL
#   SUPABASE_STAGING_ANON_KEY        — staging Supabase anon key
#   SUPABASE_STAGING_SERVICE_ROLE_KEY — staging Supabase service-role key
#
# When these secrets are absent (fork PRs, fresh repo) the job short-circuits
# with a warning and no failure. Set them in Settings → Secrets and variables
# → Actions to activate the flow.
#
# Target: local Next.js dev server started by this workflow against the staging
# Supabase project, so auth works for real — not the anonymous Netlify mirror.

name: Bot fleet — authenticated personas

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Concurrent bot sessions"
        required: false
        default: "2"
        type: string
  schedule:
    # 15:00 UTC Monday ≈ 1:00 AM AEST Tuesday — weekly authed sweep.
    - cron: "0 15 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  authed-fleet:
    name: Seed → login → authed + lifecycle bots
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── Prerequisites check ────────────────────────────────────────────────
      - name: Check Supabase staging secrets
        id: check
        run: |
          if [ -z "${{ secrets.SUPABASE_STAGING_URL }}" ] || \
             [ -z "${{ secrets.SUPABASE_STAGING_ANON_KEY }}" ] || \
             [ -z "${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SUPABASE_STAGING_* secrets not configured — skipping authed bot run. Add them in Settings → Secrets to activate."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Setup ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v6
        if: steps.check.outputs.run == 'true'

      - uses: actions/setup-node@v6
        if: steps.check.outputs.run == 'true'
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.check.outputs.run == 'true'
        run: npm ci

      - name: Install Chromium
        if: steps.check.outputs.run == 'true'
        run: npx playwright install --with-deps chromium

      # ── Seed bot test users ────────────────────────────────────────────────
      - name: Seed bot test users (idempotent)
        if: steps.check.outputs.run == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_STAGING_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
        run: npm run bots:seed-users

      # ── Start Next.js dev server ───────────────────────────────────────────
      - name: Start dev server
        if: steps.check.outputs.run == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_STAGING_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_STAGING_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
          # Non-secret placeholders so the build doesn't abort on missing vars.
          RESEND_API_KEY: "placeholder"
          STRIPE_SECRET_KEY: "placeholder"
          CRON_SECRET: "placeholder"
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
        run: npm run dev &

      - name: Wait for dev server
        if: steps.check.outputs.run == 'true'
        run: |
          echo "Waiting for http://localhost:3000…"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Dev server ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Dev server did not start within 120s"
          exit 1

      # ── Capture Playwright auth states ─────────────────────────────────────
      - name: Capture auth storage states (auto-login)
        if: steps.check.outputs.run == 'true'
        env:
          E2E_BASE_URL: "http://localhost:3000"
        run: |
          npx playwright test e2e/visual/auto-login.spec.ts \
            --config e2e/visual/playwright.config.ts \
            --timeout 60000

      # ── Run authenticated bot personas ─────────────────────────────────────
      - name: Run authed route sweep + lifecycle flow
        if: steps.check.outputs.run == 'true'
        id: bots
        # Never fail the job — bot findings are advisory, not a hard gate here.
        continue-on-error: true
        env:
          BOTS_TARGET_CLASS: "sandbox"
          BOTS_SKIP_WEBSERVER: "1"
          BOTS_BASE_URL: "http://localhost:3000"
          BOTS_CONCURRENCY: ${{ github.event.inputs.concurrency || '2' }}
          BOTS_AI_TOKEN_BUDGET: "0"
        run: |
          npx playwright test --config bots/playwright.config.ts \
            -g "authed bot|lifecycle" 2>&1 | tee /tmp/bots-authed.log || true

      # ── Artifacts & reporting ──────────────────────────────────────────────
      - name: Upload authed bot report
        if: steps.check.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bot-authed-report-${{ github.run_id }}
          path: |
            bots/.runs/*/report.html
            bots/.runs/*/summary.md
            bots/.runs/*/findings.json
          if-no-files-found: warn
          retention-days: 14

      - name: Update authed-bots results issue
        if: steps.check.outputs.run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const title = "🔑 Bot fleet — authed personas latest results";

            let body = "⚠️ The authed bot run did not produce a summary this time.";
            let criticalCount = 0;
            let highCount = 0;
            try {
              const runsDir = "bots/.runs";
              const dirs = fs.readdirSync(runsDir)
                .map((d) => path.join(runsDir, d))
                .filter((p) => fs.statSync(p).isDirectory())
                .sort((a, b) => fs.statSync(b).mtimeMs - fs.statSync(a).mtimeMs);
              if (dirs.length > 0) {
                const summaryPath = path.join(dirs[0], "summary.md");
                if (fs.existsSync(summaryPath)) {
                  body = fs.readFileSync(summaryPath, "utf8");
                }
                const jsonPath = path.join(dirs[0], "findings.json");
                if (fs.existsSync(jsonPath)) {
                  const data = JSON.parse(fs.readFileSync(jsonPath, "utf8"));
                  criticalCount = (data.findings || []).filter((f) => f.severity === "critical").length;
                  highCount = (data.findings || []).filter((f) => f.severity === "high").length;
                }
              }
            } catch (e) {
              core.warning("Could not read authed bot output: " + e.message);
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const status = criticalCount > 0
              ? "🛑 Critical findings"
              : highCount > 0 ? "⚠️ High findings" : "✅ Clean";

            body += `\n\n**Run:** ${status} (critical: ${criticalCount}, high: ${highCount})\n📎 [Artifact](${runUrl})`;

            const q = `repo:${context.repo.owner}/${context.repo.repo} in:title type:issue state:open "${title}"`;
            const found = await github.rest.search.issuesAndPullRequests({ q });
            const existing = found.data.items.find((i) => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.notice(`Updated results issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["bot-findings"],
              });
              core.notice(`Created results issue #${created.data.number}`);
            }

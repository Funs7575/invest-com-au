# ──────────────────────────────────────────────────────────────────
# Supabase migration auto-apply
#
# Runs `supabase db push` against the production Supabase project
# whenever new migration files land on main, and is also available as
# a manual `workflow_dispatch` so you can re-apply on demand from the
# Actions tab.
#
# Required GitHub Actions secrets:
#   SUPABASE_ACCESS_TOKEN  — personal access token from
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   — the short project ref (e.g. "abcdxyz") from
#                            Supabase → Project Settings → General
#   SUPABASE_DB_PASSWORD   — database password from Supabase →
#                            Project Settings → Database → Password
#
# Safety:
#   - Only runs on push to `main` (not on PRs) or via manual dispatch.
#   - Skips cleanly (no failure) when secrets aren't set, so the first
#     push after this workflow lands won't break.
#   - `db push --include-all` applies any remote-missing migrations in
#     order. Supabase records applied versions in
#     `supabase_migrations.schema_migrations`, so re-runs are no-ops.
#   - Migration files must be idempotent (CLAUDE.md migration discipline)
#     so a re-run after partial failure is safe.
# ──────────────────────────────────────────────────────────────────

name: Supabase migrate

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering this manually?"
        required: false
        default: "Manual catch-up"

permissions:
  contents: read

concurrency:
  group: supabase-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply pending migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check secrets are configured
        id: precheck
        env:
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$ACCESS_TOKEN" ] || [ -z "$PROJECT_REF" ] || [ -z "$DB_PASSWORD" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF / SUPABASE_DB_PASSWORD secrets are not all set. Skipping migration apply. Configure them in Settings → Secrets → Actions to enable auto-apply."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.precheck.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        if: steps.precheck.outputs.skip != 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        if: steps.precheck.outputs.skip != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Push pending migrations
        if: steps.precheck.outputs.skip != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db push --include-all --password "$SUPABASE_DB_PASSWORD" --linked

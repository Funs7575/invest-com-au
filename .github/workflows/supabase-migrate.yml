# ──────────────────────────────────────────────────────────────────
# Supabase migration auto-apply
#
# Runs `supabase db push` against the production Supabase project
# whenever new migration files land on main, and is also available as
# a manual `workflow_dispatch` so you can re-apply on demand from the
# Actions tab.
#
# Required GitHub Actions secrets:
#   SUPABASE_ACCESS_TOKEN  — personal access token from
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   — the short project ref (e.g. "abcdxyz") from
#                            Supabase → Project Settings → General
#   SUPABASE_DB_PASSWORD   — database password from Supabase →
#                            Project Settings → Database → Password
#
# Safety:
#   - Only runs on push to `main` (not on PRs) or via manual dispatch.
#   - FAILS LOUDLY (red) when the required secrets aren't all set, so a
#     misconfiguration can never again masquerade as a successful apply.
#     (This replaced a "skip cleanly = green" precheck that silently
#     no-op'd every run since the workflow landed — the live DB drifted
#     from supabase/migrations/ the whole time and the green ticks hid it.
#     This job is not a required check and does not trigger the auto-revert
#     workflow, so a red here blocks nothing; it is purely a visible signal.
#     See docs/runbooks/MIGRATION_DEPLOY_BACKLOG.md.)
#   - `db push --include-all` applies any remote-missing migrations in
#     order. Supabase records applied versions in
#     `supabase_migrations.schema_migrations`, so re-runs are no-ops.
#   - Migration files must be idempotent (CLAUDE.md migration discipline)
#     so a re-run after partial failure is safe.
# ──────────────────────────────────────────────────────────────────

name: Supabase migrate

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering this manually?"
        required: false
        default: "Manual catch-up"

permissions:
  contents: read

concurrency:
  group: supabase-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply pending migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Require Supabase secrets
        env:
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          missing=""
          if [ -z "$ACCESS_TOKEN" ]; then missing="${missing} SUPABASE_ACCESS_TOKEN"; fi
          if [ -z "$PROJECT_REF" ];  then missing="${missing} SUPABASE_PROJECT_REF"; fi
          if [ -z "$DB_PASSWORD" ];  then missing="${missing} SUPABASE_DB_PASSWORD"; fi
          if [ -n "$missing" ]; then
            echo "::error::Supabase migrate did NOT run — missing required Actions secret(s):${missing}. No migrations were applied, so the live database will silently drift from supabase/migrations/. Set them under Settings → Secrets and variables → Actions, then re-run. NOTE: turning auto-apply on is founder/legal-gated until the migration backlog and the CSF compliance hold are cleared via docs/runbooks/MIGRATION_DEPLOY_BACKLOG.md (db push --include-all would otherwise replay the whole backlog at once)."
            exit 1
          fi
          echo "All required Supabase secrets are present — proceeding with apply."

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Push pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db push --include-all --password "$SUPABASE_DB_PASSWORD" --linked

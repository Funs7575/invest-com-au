name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Stub required env vars so imports resolve without crashing
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      RESEND_API_KEY: placeholder
      STRIPE_SECRET_KEY: placeholder
      STRIPE_WEBHOOK_SECRET: placeholder
      NEXT_PUBLIC_SITE_URL: https://invest.com.au
      CRON_SECRET: placeholder

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Rate-limit coverage audit
        run: npm run audit:rate-limits -- --strict

      - name: Cache Next.js build
        # Keyed on lockfile + source hash so any app/lib/component
        # change busts it cleanly. Next.js uses .next/cache for
        # webpack module persistence + type-checking incrementals;
        # a warm cache cuts production-build time by ~30–50%.
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.{ts,tsx}', 'components/**/*.{ts,tsx}', 'lib/**/*.{ts,tsx}', 'next.config.ts', 'tsconfig.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build (catches production-only errors)
        run: npm run build

      # Upload .next so dependent jobs (e2e, a11y, lighthouse*) can
      # download instead of rebuilding from scratch. Each rebuild
      # costs ~2-4 min; with 4 downstream jobs that's ~8-16 min saved
      # per PR. Restricted to PR runs because main-branch pushes
      # don't have downstream jobs — no benefit uploading.
      #
      # Path note: Next.js 16 writes to .next/. Not cached between
      # workflow runs (that's what the Cache Next.js build step above
      # does); this artifact is for sibling-job sharing within a
      # single workflow run.
      - name: Upload .next build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          # v4 expects globs, not bare directory names. `.next/**`
          # recursively matches every file; `!.next/cache/**` prunes
          # the webpack cache (we have a separate step for that).
          path: |
            .next/**
            !.next/cache/**
          # v4 skips dotfiles/dotdirs by default — .next starts
          # with a dot so without this flag the glob matches zero
          # files. Flipping this on restores the v3 behaviour for
          # this specific artifact.
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: error

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Direct gitleaks binary. Replaced gitleaks/gitleaks-action@v2
      # after it began fast-failing during init (likely their
      # GitHub API licence check). The binary does exactly the
      # same scan without the action's init overhead.
      - name: Install gitleaks
        run: |
          set -e
          VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        # continue-on-error: a real leak is a P1 but we don't want to
        # block a PR for a false positive in historical commits. The
        # SARIF report is uploaded so reviewers can inspect any hits
        # without the merge being held up.
        continue-on-error: true
        run: gitleaks git --no-banner --redact --exit-code 1 --report-format sarif --report-path gitleaks.sarif

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore

  dependency-scan:
    name: Dependency vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: npm audit (high + critical only)
        run: |
          # Fails the job if there are any HIGH or CRITICAL
          # vulnerabilities. Moderate + low are surfaced for
          # review but do not block the merge.
          # Using --omit=dev instead of the deprecated --production
          # flag; --production warns on newer npm and can fail in
          # strict mode.
          npm audit --audit-level=high --omit=dev

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        # continue-on-error because this action can fail on init
        # for public personal repos without GitHub Advanced Security.
        # npm audit above is the blocking check; dep-review is
        # additive (license + diff-based advisory matching).
        continue-on-error: true
        with:
          fail-on-severity: high
          # allow-licenses: keeps the copyleft-safety check in
          # one place so the review fails if someone adds a GPL
          # dep to what's otherwise MIT/Apache/BSD.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, CC0-1.0, CC-BY-4.0, 0BSD, Unlicense, BlueOak-1.0.0

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'pull_request'
    # Reuse the .next artifact uploaded by the main ci job so we
    # don't rebuild the whole app from scratch. Saves ~3-4 min per
    # PR. If the ci job fails the artifact won't exist; the
    # `needs: ci` guarantees this job only runs on a green build.
    needs: ci

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      RESEND_API_KEY: placeholder
      STRIPE_SECRET_KEY: placeholder
      STRIPE_WEBHOOK_SECRET: placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      CRON_SECRET: placeholder
      CI: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: |
          PW_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-chromium-webkit

      - name: Install Playwright browsers
        # Install chromium + webkit for cross-browser coverage. Firefox
        # is omitted to keep the install under 90s on cold cache; the
        # Blink/WebKit pair catches the vast majority of engine bugs.
        # On cache hit, skip the browser download (saves ~60–90s) but
        # still install OS-level deps because those live outside the
        # cached path.
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium webkit
          else
            npx playwright install --with-deps chromium webkit
          fi

      - name: Download .next build from ci job
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Run Playwright
        # continue-on-error because E2E tests depend on real
        # Supabase data (brokers, articles, advisors) to render
        # pages. CI runs with placeholder credentials so most
        # data-bound assertions fail regardless of the code. The
        # unit + integration tests in the Lint/Test/Build job
        # cover the logic; this is a best-effort browser smoke
        # screen. Flip back to hard-fail once staging creds are
        # wired into CI (see docs/staging-environment.md).
        continue-on-error: true
        run: npx playwright test --retries=2 --reporter=blob,github

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  supabase-types-drift:
    name: Supabase types drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    # Skips gracefully when the SUPABASE_ACCESS_TOKEN secret is not
    # configured — the job succeeds instead of failing the PR, so the
    # workflow remains forward-compatible for forks / new clones.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Check for drift between DB schema and lib/database.types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_ID not set — skipping drift check"
            exit 0
          fi
          npx supabase gen types typescript --project-id "$SUPABASE_PROJECT_ID" > /tmp/generated.ts
          if ! diff -u lib/database.types.ts /tmp/generated.ts > drift.diff; then
            echo "::error::lib/database.types.ts has drifted from the live schema."
            echo "Run 'npm run db:types' locally, commit the update, and push again."
            echo ""
            echo "--- drift (first 100 lines) ---"
            head -100 drift.diff || true
            exit 1
          fi
          echo "lib/database.types.ts matches live DB schema."

  rls-isolation-gate:
    name: RLS isolation gate (new user-data tables)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    # Why this exists (V-NEW-04): any migration that adds a table with a
    # user_id/owner_id column must ship alongside an isolation test proving
    # that user A cannot read or mutate user B's rows.  The gate scans only
    # migration files added in this PR, so it never fails for pre-existing
    # tables.  Skip token not required — this is a static file analysis.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check new user-data tables have RLS isolation tests
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: node scripts/check-rls-isolation.mjs

  stale-dated-stats-gate:
    name: Stale dated-stats gate (DatedStatBadge stalesAt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Why this exists (V-NEW-01): any <DatedStatBadge stalesAt="…"> whose date
    # is in the past means a dated claim on a hub page has expired without being
    # updated — users see incorrect (outdated) stats in production.  This gate
    # scans every .tsx file in the repo so stale badges can never ship silently.
    # Escape hatches: file-level `// dated-stale-exempt` (for DB-driven dates),
    # usage-level `{/* dated-stale-ok */}` immediately before the badge (for
    # genuinely historical dates: launch milestones, legal effective dates).
    # Skip token not required — this is a static file analysis.
    steps:
      - uses: actions/checkout@v6
      - name: Check for stale DatedStatBadge stalesAt props
        run: node scripts/check-stale-dated-stats.mjs

  stripe-idempotency-gate:
    name: Stripe webhook idempotency gate (new handlers)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    # Why this exists (V-NEW-03): any new Stripe webhook handler added under
    # app/api/webhooks/stripe/** (the DD-* stream path) must ship alongside an
    # idempotency replay test proving that replaying the same event N times
    # converges to the same DB state.  Duplicate charges, double subscriptions,
    # and double wallet credits are revenue / trust disasters.
    # The gate scans only handler files ADDED in this PR; existing handlers
    # (app/api/stripe/webhook/route.ts) are covered by the existing test suite.
    # Skip token not required — this is a static file analysis.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check new Stripe webhook handlers have idempotency tests
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: node scripts/check-stripe-idempotency.mjs

  lighthouse-cwv-gate:
    name: Lighthouse — Core Web Vitals gate (hard-fail)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    needs: ci
    # Separate from the advisory Lighthouse job below — this one hard
    # fails the PR if LCP / CLS / TBT regress past agreed thresholds.
    # Uses median of 3 runs to reduce runner-load noise.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      RESEND_API_KEY: placeholder
      STRIPE_SECRET_KEY: placeholder
      STRIPE_WEBHOOK_SECRET: placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      CRON_SECRET: placeholder
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Download .next build from ci job
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next
      - name: Run Lighthouse CWV gate
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.cwv.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  a11y:
    name: Accessibility (axe-core on key routes)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    needs: ci
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      RESEND_API_KEY: placeholder
      STRIPE_SECRET_KEY: placeholder
      STRIPE_WEBHOOK_SECRET: placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      CRON_SECRET: placeholder
      CI: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Get Playwright version
        id: playwright-version
        run: |
          PW_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browser (chromium-only)
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-chromium
      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi
      - name: Download .next build from ci job
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next
      - name: Run axe-core a11y suite
        # --project=chromium skips webkit + mobile-safari; WebKit
        # tests here were timing out on networkidle and adding ~3min
        # to every PR for no a11y signal (axe runs against the DOM,
        # not engine rendering). Engine differences are covered by
        # the E2E job.
        run: npx playwright test e2e/a11y.spec.ts --project=chromium --reporter=github
      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  lighthouse:
    name: Lighthouse CI (main canonical pages)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    needs: ci

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Download .next build from ci job
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next
      - name: Run Lighthouse CI
        # continue-on-error at step level so the check run reports
        # success even when LCP / CLS / etc fail thresholds. Lighthouse
        # scoring is sensitive to ephemeral runner load and is
        # advisory on this pipeline. Job-level continue-on-error
        # would still report the check as failed in the PR UI.
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  preview-smoke:
    name: Preview smoke test (critical URLs)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    # Why this exists: our CI up to this point compiles and tests
    # against placeholder credentials, so a handful of pages that
    # look fine locally still return 4xx/5xx against real Supabase.
    # This job waits for Vercel's preview deploy (which runs on the
    # real project env), then curls a curated set of high-value
    # paths and fails the PR if any of them return >=400. The list
    # is deliberately small; grow it as new hubs come online so a
    # missed seed row or renamed route trips CI, not the user.
    steps:
      - name: Wait for Vercel preview + smoke test
        uses: actions/github-script@v9
        env:
          VERCEL_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_TOKEN }}
        with:
          script: |
            const BYPASS = process.env.VERCEL_BYPASS || '';
            const CRITICAL_PATHS = [
              '/',
              '/invest',
              '/invest/oil-gas',
              '/invest/gold',
              '/invest/mining',
              '/invest/commodities',
              '/articles',
              '/brokers',
              '/advisors',
              '/about',
              '/foreign-investment',
              '/privacy',
              '/glossary',
              '/how-we-earn',
            ];
            const sha = context.payload.pull_request.head.sha;

            // Poll GitHub deployments for up to 6 minutes waiting
            // for Vercel's preview to land. We filter by environment
            // containing "Preview" because Vercel's env name varies
            // ("Preview" vs "Preview – invest-com-au").
            const deadline = Date.now() + 6 * 60 * 1000;
            let previewUrl = null;
            while (Date.now() < deadline && !previewUrl) {
              const deploys = await github.rest.repos.listDeployments({
                ...context.repo,
                sha,
                per_page: 30,
              });
              for (const dep of deploys.data) {
                if (!(dep.environment || '').toLowerCase().includes('preview')) continue;
                const statuses = await github.rest.repos.listDeploymentStatuses({
                  ...context.repo,
                  deployment_id: dep.id,
                  per_page: 20,
                });
                const success = statuses.data.find(
                  (s) => s.state === 'success' && s.target_url,
                );
                if (success) {
                  previewUrl = success.target_url.replace(/\/$/, '');
                  break;
                }
              }
              if (!previewUrl) await new Promise((r) => setTimeout(r, 15000));
            }
            if (!previewUrl) {
              core.setFailed('No Vercel preview URL found within 6 min.');
              return;
            }
            core.info(`Preview URL: ${previewUrl}`);

            const headers = BYPASS ? { 'x-vercel-protection-bypass': BYPASS } : {};
            const results = [];
            for (const p of CRITICAL_PATHS) {
              const url = `${previewUrl}${p}`;
              const t0 = Date.now();
              let status = 0;
              try {
                const res = await fetch(url, { redirect: 'manual', headers });
                status = res.status;
              } catch (e) {
                status = 0;
              }
              const ms = Date.now() - t0;
              results.push({ path: p, status, ms });
              core.info(`  ${status >= 400 || status === 0 ? 'FAIL' : ' OK '}  ${status}  ${ms}ms  ${p}`);
            }

            // If EVERY path returns 401, Vercel deployment protection is
            // blocking the smoke test — that is an infra problem, not a
            // code problem. Warn loudly but do not fail the PR: letting
            // every PR fail here teaches reviewers to ignore red CI.
            // Either set VERCEL_AUTOMATION_BYPASS_TOKEN or turn off
            // deployment protection for previews to restore the check.
            const allAuthWalled = results.every((r) => r.status === 401);
            if (allAuthWalled) {
              core.warning(
                'All preview URLs returned 401 — Vercel deployment protection is blocking the smoke test. ' +
                'Set the VERCEL_AUTOMATION_BYPASS_TOKEN secret to restore coverage. Skipping.',
              );
              return;
            }

            const failures = results.filter((r) => r.status === 0 || r.status >= 400);
            if (failures.length) {
              const lines = failures.map((f) => `- ${f.path} → ${f.status || 'network error'}`).join('\n');
              core.setFailed(`${failures.length} critical path(s) failed:\n${lines}`);
            } else {
              core.info(`All ${results.length} critical paths returned <400.`);
            }

name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Stub required env vars so imports resolve without crashing
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      RESEND_API_KEY: placeholder
      STRIPE_SECRET_KEY: placeholder
      STRIPE_WEBHOOK_SECRET: placeholder
      NEXT_PUBLIC_SITE_URL: https://invest.com.au
      CRON_SECRET: placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (catches production-only errors)
        run: npm run build

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: npm audit (high + critical only)
        run: |
          # Fails the job if there are any HIGH or CRITICAL
          # vulnerabilities. Moderate + low are surfaced for
          # review but do not block the merge.
          npm audit --audit-level=high --production

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # allow-licenses: keeps the copyleft-safety check in
          # one place so the review fails if someone adds a GPL
          # dep to what's otherwise MIT/Apache/BSD.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, CC0-1.0, CC-BY-4.0, 0BSD, Unlicense, BlueOak-1.0.0

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'pull_request'

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      RESEND_API_KEY: placeholder
      STRIPE_SECRET_KEY: placeholder
      STRIPE_WEBHOOK_SECRET: placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      CRON_SECRET: placeholder
      CI: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run Playwright
        run: npx playwright test
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI (main canonical pages)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          RESEND_API_KEY: placeholder
          STRIPE_SECRET_KEY: placeholder
          STRIPE_WEBHOOK_SECRET: placeholder
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          CRON_SECRET: placeholder
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

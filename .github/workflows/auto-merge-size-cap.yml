name: Auto-merge size cap

# Hard cap on auto-merge eligibility regardless of changed paths. Big
# diffs hide regressions even when every file is in the SAFE allowlist
# (e.g. a 2k-line dump of seed content can still mask a copy-paste bug).
# This workflow runs in parallel with auto-merge-label.yml and adds
# `needs-human-review` if the PR exceeds either size threshold.
#
# Thresholds:
#   - more than 500 changed lines (additions + deletions), OR
#   - more than 15 changed files
#
# `needs-human-review` always wins over `auto-merge-safe` (the auto-merge
# workflow checks for the review label and refuses to merge), so adding
# this label on top of any other labeling decision correctly blocks
# auto-merge while still letting a human decide. We never REMOVE the
# review label here — only the labeling workflow can promote a PR to
# safe, and it already strips the review label when it does.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-merge-size-cap-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  size-cap:
    name: Enforce size cap
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Inspect PR size
        uses: actions/github-script@v9
        env:
          MAX_LINES: "500"
          MAX_FILES: "15"
          REVIEW_LABEL: "needs-human-review"
          SAFE_LABEL: "auto-merge-safe"
        with:
          script: |
            const pr = context.payload.pull_request;
            const maxLines = Number(process.env.MAX_LINES);
            const maxFiles = Number(process.env.MAX_FILES);
            const reviewLabel = process.env.REVIEW_LABEL;
            const safeLabel = process.env.SAFE_LABEL;
            const lines = (pr.additions || 0) + (pr.deletions || 0);
            const files = pr.changed_files || 0;
            core.info(`pr#${pr.number}: ${lines} lines, ${files} files`);
            if (lines <= maxLines && files <= maxFiles) {
              core.info("under cap — no action");
              return;
            }
            const reasons = [];
            if (lines > maxLines) reasons.push(`${lines} > ${maxLines} lines`);
            if (files > maxFiles) reasons.push(`${files} > ${maxFiles} files`);
            core.info(`over cap: ${reasons.join(", ")} — adding ${reviewLabel}`);
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [reviewLabel],
              });
            } catch (err) {
              core.warning(`add label failed: ${err.message}`);
            }
            // Also strip auto-merge-safe if present — size-cap is a hard
            // override and we don't want both labels coexisting.
            const current = (pr.labels || []).map((l) => l.name);
            if (current.includes(safeLabel)) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: safeLabel,
                });
              } catch (err) {
                core.info(`removeLabel ${safeLabel}: ${err.message}`);
              }
            }

name: code-quality (weekly)

# Sundays at 23:00 UTC (Monday 09:00 / 10:00 AEST depending on DST).
# Collects all 12 metrics from .quality-targets.yml, writes the snapshot
# to docs/audits/metrics-history/<date>.json + metrics-latest.json,
# and opens a PR with the diff so the founder sees deltas in review.
#
# Manual triggering:
#   gh workflow run code-quality.yml
#
# Source: 2026-04-26 audit dashboard parallel workstream.

on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Install collector deps
        run: npm install --no-save tsx js-yaml @supabase/supabase-js

      - name: Run vitest with coverage (best-effort)
        run: npm run test:coverage -- --reporter=dot
        continue-on-error: true

      # Lighthouse top-5 mobile — runs the same set of canonical pages
      # that .lighthouserc.json defines (/, /compare, /quiz,
      # /find-advisor, /fee-impact). Reuses the .next build from the
      # `Install` step's `npm ci` (we don't have an artifact dependency
      # here — this is the weekly job, not the per-PR pipeline). Build
      # fresh so the score reflects current main, not yesterday's
      # cached output.
      #
      # The treosh action writes scores into
      # ./.lighthouseci/manifest.json — we read the median performance
      # score per URL and emit a JSON array as `lighthouse=[91,87,…]`.
      # The collector script (collectFromLighthouse in
      # scripts/collect-quality-metrics.ts) takes the median of that
      # array as M11.
      #
      # continue-on-error keeps the snapshot step running if LH itself
      # fails — when scores are missing the collector falls through to
      # the baseline value and the rest of the dashboard updates.
      - name: Build for Lighthouse
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          RESEND_API_KEY: placeholder
          STRIPE_SECRET_KEY: placeholder
          STRIPE_WEBHOOK_SECRET: placeholder
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          CRON_SECRET: placeholder

      - name: Run Lighthouse against canonical pages
        id: lh-run
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Extract LH median performance scores
        id: lh
        continue-on-error: true
        run: |
          set -eu
          if [ ! -f ".lighthouseci/manifest.json" ]; then
            echo "No LH manifest — falling back to baseline"
            echo "lighthouse=[0,0,0,0,0]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # The manifest has multiple runs per URL; we want the
          # representative perf score per URL. The treosh action sets
          # `isRepresentativeRun: true` on the run it picked as the
          # median. node-only one-liner — keeps the workflow file
          # readable while doing the JSON work properly.
          SCORES=$(node -e '
            const m = JSON.parse(require("fs").readFileSync(".lighthouseci/manifest.json","utf8"));
            const byUrl = {};
            for (const r of m) {
              if (!r.isRepresentativeRun) continue;
              const summary = JSON.parse(require("fs").readFileSync(r.jsonPath,"utf8"));
              const perf = summary?.categories?.performance?.score;
              if (typeof perf === "number") byUrl[r.url] = Math.round(perf * 100);
            }
            const arr = Object.values(byUrl);
            console.log(JSON.stringify(arr.length ? arr : [0,0,0,0,0]));
          ')
          echo "lighthouse=$SCORES" >> "$GITHUB_OUTPUT"
          echo "Captured LH scores: $SCORES"

      - name: Collect metrics
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LIGHTHOUSE_TOP5: ${{ steps.lh.outputs.lighthouse }}
          GITHUB_SHA: ${{ github.sha }}
        run: npx tsx scripts/collect-quality-metrics.ts > /tmp/snapshot.json

      - name: Show grade
        run: |
          GRADE=$(node -e "console.log(require('/tmp/snapshot.json').grade)")
          SCORE=$(node -e "console.log(require('/tmp/snapshot.json').weighted_score.toFixed(3))")
          echo "## Quality grade: \`$GRADE\` (weighted $SCORE)" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.metrics[] | "- \(.id) — current=\(.current) target=\(.target) score=\(.score | tonumber * 100 | floor)%"' /tmp/snapshot.json >> "$GITHUB_STEP_SUMMARY"

      # Push the snapshot directly to main rather than opening a PR.
      # The repo's "Allow GitHub Actions to create and approve pull requests"
      # toggle is OFF; create-pull-request@v6 was failing here, leaving
      # docs/audits/metrics-latest.json absent and the dashboard frozen on
      # the hand-authored baseline. Direct push is fine because the diff is
      # bounded (only docs/audits/metrics-history/<date>.json + metrics-latest.json),
      # the workflow runs once a week, and the GITHUB_TOKEN already has
      # contents:write per the permissions block above.
      - name: Commit + push snapshot to main
        run: |
          set -eu
          # Use git status (sees untracked files too); git diff only compares
          # tracked files. On the first run, metrics-latest.json + the
          # history file are both new → diff sees no change but status does.
          if [ -z "$(git status --porcelain -- docs/audits/metrics-history/ docs/audits/metrics-latest.json)" ]; then
            echo "No metrics change; skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/audits/metrics-history/ docs/audits/metrics-latest.json
          git commit \
            -m "chore(metrics): weekly quality snapshot — $(date -u +%Y-%m-%d)" \
            -m "Auto-generated by .github/workflows/code-quality.yml on $(date -u +%FT%TZ). See docs/audits/metrics-latest.json for full numbers; docs/audits/metrics-history/ for trend."
          # Race-safe push: rebase onto latest main + retry. Other commits
          # land while the snapshot is being computed (cloud audit-loop
          # iterations push to main every few minutes), so non-fast-forward
          # rejection is the common case, not the exception.
          for i in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "Rebase conflict on attempt $i — abandoning push (manual intervention needed)"
              exit 1
            fi
            if HUSKY=0 git push origin HEAD:main; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push rejected on attempt $i (race) — retrying after fetch"
            sleep 3
          done
          echo "Push failed after 3 attempts"
          exit 1
